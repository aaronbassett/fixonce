name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit (advisory-only, does not fail build)
        run: cargo audit || true

  deno:
    name: Deno checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check Deno formatting
        run: |
          if find supabase/functions -name '*.ts' 2>/dev/null | grep -q .; then
            deno fmt --check --config supabase/functions/deno.json supabase/functions
          else
            echo "No edge function files found, skipping Deno fmt check."
          fi

      - name: Run Deno lint
        run: |
          if find supabase/functions -name '*.ts' 2>/dev/null | grep -q .; then
            deno lint --config supabase/functions/deno.json supabase/functions
          else
            echo "No edge function files found, skipping Deno lint."
          fi

      - name: Run Deno type check
        run: |
          if find supabase/functions -name '*.ts' 2>/dev/null | grep -q .; then
            deno check --config supabase/functions/deno.json supabase/functions/**/*.ts
          else
            echo "No edge function files found, skipping Deno type check."
          fi
